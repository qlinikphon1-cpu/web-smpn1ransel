<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tab Foto Kegiatan dengan Slideshow</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8" style="background-image: url(/img/gambar-animasi-anak-smp-19.jpg);">
    <div class="max-w-4xl mx-auto bg-cyan-400 bg-transparent-100 rounded-lg shadow-lg p-6">
        <h2 class="text-2xl font-bold mb-8 text-center">Foto Kegiatan Drumband <br>SMPN 1 RANTAU SELATAN</h2>
        
        <!-- Container Slideshow -->
        <div class="relative overflow-hidden rounded-lg">
            <div id="slideshow" class="flex transition-transform duration-500 ease-in-out">
                <!-- Slide 1 -->
                <div class="w-full flex-shrink-0">
                    <img src="/imgdrumband/img1.jpg" alt="#" class="w-full h-30 object-cover">
                    <p class="text-center mt-2 text-gray-600">Latihan Untuk Menyambut 17 Agustus 2025</p>
                </div>
                <!-- Slide 2 -->
                <div class="w-full flex-shrink-0">
                    <img src="#" alt="Foto Kegiatan 2" class="w-full h-64 object-cover">
                    <p class="text-center mt-2 text-gray-600">Deskripsi kegiatan 2</p>
                </div>
                <!-- Slide 3 -->
                <div class="w-full flex-shrink-0">
                    <img src="#" alt="Foto Kegiatan 3" class="w-full h-64 object-cover">
                    <p class="text-center mt-2 text-gray-600">Deskripsi kegiatan 3</p>
                </div>
                <!-- Tambahkan lebih banyak slide sesuai kebutuhan -->
            </div>
            
            <!-- Tombol Navigasi -->
            <button id="prev" class="absolute left-2 top-1/2 transform -translate-y-1/2 bg-black bg-opacity-50 text-white p-2 rounded-full hover:bg-opacity-75">&lt;</button>
            <button id="next" class="absolute right-2 top-1/2 transform -translate-y-1/2 bg-black bg-opacity-50 text-white p-2 rounded-full hover:bg-opacity-75">&gt;</button>
            
            <!-- Indikator Dots -->
            <div class="flex justify-center mt-4 space-x-2">
                <span class="dot w-3 h-3 bg-gray-300 rounded-full cursor-pointer" data-slide="0"></span>
                <span class="dot w-3 h-3 bg-gray-300 rounded-full cursor-pointer" data-slide="1"></span>
                <span class="dot w-3 h-3 bg-gray-300 rounded-full cursor-pointer" data-slide="2"></span>
            </div>

            <!-- Tombol Kembali (ditambahkan) -->
            <div class="flex justify-center mt-6">
                <button id="backBtn" class="bg-white text-cyan-600 font-semibold px-4 py-2 rounded shadow hover:bg-blue-100">
                    Kembali ke Halaman Awal
                </button>
            </div>
        </div>  
    </div>

    <script>
        const slideshow = document.getElementById('slideshow');
        const slides = slideshow.children;
        const dots = document.querySelectorAll('.dot');
        let currentIndex = 0;

        function updateSlideshow() {
            slideshow.style.transform = `translateX(-${currentIndex * 100}%)`;
            dots.forEach((dot, index) => {
                dot.classList.toggle('bg-blue-500', index === currentIndex);
                dot.classList.toggle('bg-gray-300', index !== currentIndex);
            });
        }

        document.getElementById('next').addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % slides.length;
            updateSlideshow();
        });

        document.getElementById('prev').addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + slides.length) % slides.length;
            updateSlideshow();
        });

        dots.forEach((dot, index) => {
            dot.addEventListener('click', () => {
                currentIndex = index;
                updateSlideshow();
            });
        });

        // Auto-slide setiap 5 detik (opsional)
        setInterval(() => {
            currentIndex = (currentIndex + 1) % slides.length;
            updateSlideshow();
        }, 5000);

        // Handler tombol Kembali
        document.getElementById('backBtn').addEventListener('click', () => {
            // Kembali ke halaman sebelumnya
            if (window.history.length > 1) {
                window.history.back();
            } else {
                // Jika tidak ada history, redirect ke halaman index (ubah sesuai kebutuhan)
                window.location.href = '/';
            }
        });
    </script>
</body>
</html>
